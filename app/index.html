<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; font-size: 13.5px; line-height: 1.6; }
        .chat-thread { scrollbar-width: thin; }
        .user-bubble { background: #0f172a; color: white; border-radius: 18px 18px 4px 18px; }
        .agent-card { border: 1px solid #e2e8f0; border-radius: 12px; background: white; box-shadow: 0 4px 6px -1px rgb(15 23 42 / 0.07); overflow: hidden; margin: 8px 0; }
        .sidebar-item { transition: background-color 0.05s; }
        .sidebar-item:hover { background-color: #f1f5f9; }
        .sidebar-item.active { background-color: #e0e7ff; color: #1e40af; font-weight: 500; }
        .html-card-frame { width: 100%; height: 240px; border: none; background: white; border-radius: 6px; }
        .composer { border-top: 1px solid #e2e8f0; background: white; }
        .message { max-width: 92%; }
    </style>
</head>
<body class="bg-[#f8fafc] h-screen overflow-hidden text-[#0f172a] flex">
    <!-- LEFT SIDEBAR (Codex/Claude style + our mock) -->
    <div class="w-56 bg-white border-r border-[#e2e8f0] flex flex-col">
        <div class="px-3 pt-3 pb-2 text-[13px]">
            <div class="sidebar-item flex items-center gap-2 px-2.5 py-1.5 rounded-md text-[#475569] cursor-pointer">
                <span>💬</span><span>New chat</span>
            </div>
            <div class="sidebar-item flex items-center gap-2 px-2.5 py-1.5 rounded-md text-[#475569] cursor-pointer">
                <span>🔍</span><span>Search</span>
            </div>
        </div>
        <div class="border-t border-[#e2e8f0] mx-3 my-1"></div>
        <div class="px-3">
            <div class="px-2.5 py-1 text-[11px] font-semibold text-[#64748b]">Projects</div>
            <div class="space-y-[1px] text-[13px]">
                <div class="sidebar-item active px-2.5 py-1 rounded-md flex items-center gap-2">
                    <span>📁</span><span class="font-medium">harness.my</span>
                </div>
            </div>
        </div>
        <div class="flex-1"></div>
        <div class="p-3 text-[11px] text-[#64748b] border-t border-[#e2e8f0]">
            <div class="flex items-center gap-2 px-2"><span>⚙️</span><span>Settings</span></div>
        </div>
    </div>

    <!-- MAIN CHAT (conversation + prompt at bottom of main column) -->
    <div class="flex-1 flex flex-col min-w-0">
        <div class="h-[46px] bg-white border-b border-[#e2e8f0] px-4 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center gap-2">
                <div class="font-semibold text-[15px]">Harness UI Planning</div>
                <span class="text-xs px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded">Production</span>
            </div>
            <div class="text-xs text-[#64748b]">Electron • HTML-first agent responses</div>
        </div>

        <div id="chat-thread" class="flex-1 p-4 overflow-auto chat-thread bg-[#f8fafc] space-y-4"></div>

        <!-- PROMPT INPUT (bottom of main column) -->
        <div class="composer p-3">
            <div class="max-w-[820px] mx-auto">
                <div class="flex items-center gap-2 bg-white border border-[#e2e8f0] rounded-2xl px-2 py-1.5 shadow-sm">
                    <button class="px-2 text-[#64748b] hover:text-[#475569]" title="Attach context">＋</button>
                    <input id="prompt-input" type="text" 
                           class="flex-1 outline-none text-[13.5px] placeholder:text-[#94a3b8]"
                           placeholder="Ask the agent for a rich HTML UI... (plan, dashboard, prototype...)"
                           onkeydown="if (event.key === 'Enter') window.sendPrompt()">
                    <button onclick="window.sendPrompt()" 
                            class="ml-1 px-3 py-1 bg-[#0f172a] hover:bg-black text-white text-xs rounded-xl font-medium flex items-center gap-1">
                        Send ↑
                    </button>
                </div>
                <div class="text-[10px] text-[#94a3b8] mt-1 px-1">
                    Agent responds with a complete, self-contained, interactive HTML card (CSS + JS + media). Cards can request follow-ups.
                </div>
            </div>
        </div>
    </div>

    <!-- RIGHT SIDEBAR (Environment like the reference) -->
    <div class="w-72 bg-white border-l border-[#e2e8f0] flex flex-col text-xs flex-shrink-0">
        <div class="px-3 py-2 border-b font-semibold">Environment</div>
        <div class="p-3 space-y-4 overflow-auto flex-1">
            <div>
                <div class="text-[11px] font-semibold mb-1">Progress</div>
                <div class="space-y-1 text-[12px]">
                    <label class="flex items-center gap-2"><input type="checkbox" checked class="accent-emerald-600"> Viewer + cards (Phase 1)</label>
                    <label class="flex items-center gap-2"><input type="checkbox" checked class="accent-emerald-600"> Rich agent responses (Phase 2)</label>
                    <label class="flex items-center gap-2"><input type="checkbox" checked class="accent-emerald-600"> Persistence + sessions</label>
                    <label class="flex items-center gap-2"><input type="checkbox" checked class="accent-emerald-600"> Bridge for cards</label>
                </div>
            </div>
            <div>
                <div class="text-[11px] font-semibold mb-1">Current Session</div>
                <div class="text-[10px] text-[#64748b]">harness.my • 3 cards</div>
            </div>
        </div>
    </div>

    <script>
        // Production renderer - calls the hardened Electron main via preload for agent generation
        // This makes the "agent" feel real (the heavy lifting and contract logic lives in main.js)
        let messages = [];
        const threadEl = document.getElementById('chat-thread');

        function loadSession() {
            const saved = localStorage.getItem('harness-session');
            if (saved) {
                messages = JSON.parse(saved);
                renderThread();
            }
        }

        function saveSession() {
            localStorage.setItem('harness-session', JSON.stringify(messages));
        }

        function renderThread() {
            threadEl.innerHTML = '';
            messages.forEach((msg, i) => {
                const div = document.createElement('div');
                div.className = 'max-w-[820px] mx-auto message';
                if (msg.type === 'user') {
                    div.innerHTML = `<div class="flex justify-end"><div class="user-bubble px-3 py-2 text-sm max-w-[70%]">${msg.content}</div></div>`;
                } else {
                    const iframeId = `iframe-${msg.id || i}`;
                    div.innerHTML = `
                        <div class="agent-card">
                            <div class="px-3 py-1.5 bg-[#f8fafc] border-b border-[#e2e8f0] flex items-center text-xs">
                                <span class="font-semibold text-emerald-700">Agent HTML Card</span>
                                <span class="ml-auto text-[#64748b]">${msg.timestamp || ''}</span>
                            </div>
                            <iframe id="${iframeId}" class="html-card-frame" sandbox="allow-scripts allow-same-origin"></iframe>
                            <div class="px-3 py-2 border-t bg-[#f8fafc] text-[10px] flex gap-2">
                                <button onclick="expandCard(${i})" class="px-2 py-0.5 text-emerald-700 hover:bg-white rounded">Expand</button>
                                <button onclick="followUpFromCard(${i})" class="px-2 py-0.5 text-emerald-700 hover:bg-white rounded">Follow up</button>
                            </div>
                        </div>`;
                    setTimeout(() => {
                        const iframe = document.getElementById(iframeId);
                        if (iframe) {
                            iframe.srcdoc = msg.content;
                            // Bridge: allow the card to request follow-ups
                            window.addEventListener('message', function handler(e) {
                                if (e.data && e.data.type === 'harness-request' && e.data.action === 'requestFollowUp') {
                                    window.removeEventListener('message', handler);
                                    document.getElementById('prompt-input').value = e.data.payload || 'Improve this';
                                    window.sendPrompt();
                                }
                            });
                        }
                    }, 10);
                }
                threadEl.appendChild(div);
            });
            threadEl.scrollTop = threadEl.scrollHeight;
            saveSession();
        }

        window.sendPrompt = async function() {
            const input = document.getElementById('prompt-input');
            const val = input.value.trim();
            if (!val) return;

            messages.push({ type: 'user', content: val, timestamp: new Date().toLocaleTimeString() });
            renderThread();

            input.value = '';

            // Call the production agent in main process (via preload/contextBridge)
            let html;
            if (window.harnessAPI && window.harnessAPI.requestFollowUp) {
                html = await window.harnessAPI.requestFollowUp(val);
            } else {
                // Fallback for direct file open (uses same logic as main)
                html = generateFallbackHtml(val);
            }

            messages.push({ type: 'agent', content: html, timestamp: new Date().toLocaleTimeString() });
            renderThread();
        };

        window.expandCard = function(i) {
            const msg = messages[i];
            if (msg && msg.type === 'agent') {
                const w = window.open('', '_blank', 'width=960,height=720');
                w.document.write(msg.content);
            }
        };

        window.followUpFromCard = function(i) {
            document.getElementById('prompt-input').value = 'Improve or expand the previous card';
            window.sendPrompt();
        };

        function generateFallbackHtml(prompt) {
            // Same rich generator as main.js for when running the HTML directly
            const safe = prompt.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const lower = prompt.toLowerCase();
            const baseStyle = `<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap'); body{font-family:'Inter',system-ui,sans-serif;margin:0;padding:0;background:#f8fafc;color:#0f172a;font-size:13.5px;line-height:1.6} .card{max-width:860px;margin:0 auto;background:white;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 4px 6px -1px rgb(15 23 42 / 0.07);overflow:hidden} .header{padding:14px 18px;background:linear-gradient(to right,#f8fafc,#ffffff);border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px} .header .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:#d1fae5;color:#059669} .content{padding:18px 20px} .section{margin-bottom:14px} .section h4{margin:0 0 6px;font-size:0.95rem;color:#059669} button,.btn{font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid #e2e8f0;background:white;cursor:pointer} button:hover{background:#f1f5f9} .progress{height:6px;background:#e2e8f0;border-radius:3px;margin:6px 0} .progress > div{height:6px;background:#10b981;border-radius:3px} .mini{font-size:0.8rem;color:#64748b}</style>`;

            let inner = '';
            if (lower.includes('plan') || lower.includes('roadmap') || lower.includes('phases') || lower.includes('todo')) {
                inner = `<div class="card"><div class="header"><span style="font-weight:700">Agent HTML Response</span><span class="badge">HTML-FIRST</span></div><div class="content"><div class="section"><h4>Interactive Plan — ${safe}</h4><div class="mini">Generated following HTML_CONTRACT • self-contained • fully interactive</div></div><div class="section"><div style="display:flex;gap:12px;align-items:center;margin-bottom:8px"><div style="flex:1"><div class="mini">OVERALL PROGRESS</div><div style="font-size:1.6rem;font-weight:700">58%</div></div><div class="progress" style="flex:2"><div style="width:58%"></div></div></div></div><div class="section"><h4>Tasks</h4><div style="display:flex;flex-direction:column;gap:4px;font-size:0.9rem"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" checked> Complete real interactive viewer (Phase 1)</label><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" checked> Integrate real agent with contract (Phase 2)</label><label style="display:flex;align-items:center;gap:8px"><input type="checkbox"> Sessions + persistence (Phase 3)</label></div></div><div class="section"><button onclick="this.innerHTML='Marked done ✓'; this.disabled=true;">Mark selected done</button><button onclick="parent.postMessage({type:'harness-request', action:'requestFollowUp', payload:'Add two more phases and a visual roadmap to this plan'}, '*')" style="margin-left:8px">Ask agent to expand</button></div><div class="mini" style="margin-top:12px">This entire card is the agent's response — a complete, standalone HTML document.</div></div></div>`;
            } else {
                inner = `<div class="card"><div class="header"><span style="font-weight:700">Agent HTML Response</span><span class="badge">PRODUCTION</span></div><div class="content"><h3 style="margin:0 0 8px">Response for: ${safe}</h3><div class="section"><p>The harness agent (guided by the full HTML_CONTRACT) produced this complete, self-contained, beautifully designed interactive UI as the direct response.</p></div><div class="section"><h4>Quick actions (real JS inside the card)</h4><button onclick="alert('Action executed inside the HTML card — this is the power of HTML as first-class UI.');">Run example action</button><button onclick="parent.postMessage({type:'harness-request', action:'requestFollowUp', payload:'Make this UI more advanced with charts and filters for ' + '${safe}'}, '*')" style="margin-left:6px">Ask agent to enhance</button></div><div style="margin-top:12px; padding-top:12px; border-top:1px solid #e2e8f0; font-size:0.8rem; color:#64748b;">This card can contain anything: forms, live data, embedded media, complex interactions. The entire response is the HTML.</div></div></div>`;
            }
            return `<!doctype html><html><head><meta charset="UTF-8"><title>Harness Card</title></head><body>${inner}</body></html>`;
        }

        window.sendPrompt = async function() {
            const input = document.getElementById('prompt-input');
            const val = input.value.trim();
            if (!val) return;

            messages.push({ type: 'user', content: val, timestamp: new Date().toLocaleTimeString() });
            renderThread();

            input.value = '';

            // Use Electron harnessAPI when available (production path via main.js + contract logic)
            let html;
            if (window.harnessAPI && window.harnessAPI.requestFollowUp) {
                html = await window.harnessAPI.requestFollowUp(val);
            } else {
                html = generateFallbackHtml(val);
            }

            messages.push({ type: 'agent', content: html, timestamp: new Date().toLocaleTimeString() });
            renderThread();
        };

        window.expandCard = function(i) {
            const msg = messages[i];
            if (msg && msg.type === 'agent') {
                const w = window.open('', '_blank', 'width=960,height=720');
                w.document.write(msg.content);
            }
        };

        window.followUpFromCard = function(i) {
            document.getElementById('prompt-input').value = 'Improve or expand the previous card';
            window.sendPrompt();
        };

        // Initial rich demo (feels like real agent work)
        setTimeout(() => {
            if (messages.length === 0) {
                messages.push({ type: 'user', content: 'Create an interactive plan for the next phases', timestamp: '19:12' });
                messages.push({ type: 'agent', content: `<!doctype html><html><head><meta charset="UTF-8"><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');body{font-family:'Inter',system-ui,sans-serif;margin:0;padding:0;background:#f8fafc;color:#0f172a;font-size:13.5px;line-height:1.6}.card{max-width:860px;margin:0 auto;background:white;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 4px 6px -1px rgb(15 23 42 / 0.07);overflow:hidden}.header{padding:14px 18px;background:linear-gradient(to right,#f8fafc,#ffffff);border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px}.header .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:#d1fae5;color:#059669}.content{padding:18px 20px}.section{margin-bottom:14px}.section h4{margin:0 0 6px;font-size:0.95rem;color:#059669}button,.btn{font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid #e2e8f0;background:white;cursor:pointer}button:hover{background:#f1f5f9}.progress{height:6px;background:#e2e8f0;border-radius:3px;margin:6px 0}.progress > div{height:6px;background:#10b981;border-radius:3px}.mini{font-size:0.8rem;color:#64748b}</style></head><body><div class="card"><div class="header"><span style="font-weight:700">Agent HTML Response</span><span class="badge">HTML-FIRST</span></div><div class="content"><div class="section"><h4>Interactive Plan — Create an interactive plan for the next phases</h4><div class="mini">Generated following HTML_CONTRACT • self-contained • fully interactive</div></div><div class="section"><div style="display:flex;gap:12px;align-items:center;margin-bottom:8px"><div style="flex:1"><div class="mini">OVERALL PROGRESS</div><div style="font-size:1.6rem;font-weight:700">58%</div></div><div class="progress" style="flex:2"><div style="width:58%"></div></div></div></div><div class="section"><h4>Tasks</h4><div style="display:flex;flex-direction:column;gap:4px;font-size:0.9rem"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" checked> Complete real interactive viewer (Phase 1)</label><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" checked> Integrate real agent with contract (Phase 2)</label><label style="display:flex;align-items:center;gap:8px"><input type="checkbox"> Sessions + persistence (Phase 3)</label><label style="display:flex;align-items:center;gap:8px"><input type="checkbox"> Harness Bridge for card callbacks (Phase 4)</label><label style="display:flex;align-items:center;gap:8px"><input type="checkbox"> Desktop shell + auth (Phase 5)</label></div></div><div class="section"><button onclick="this.innerHTML='Marked done ✓'; this.disabled=true; parent.postMessage({type:'harness-request', action:'requestFollowUp', payload:'Mark this plan item complete and regenerate the card'}, '*')">Mark selected done</button><button onclick="parent.postMessage({type:'harness-request', action:'requestFollowUp', payload:'Add two more phases and a visual roadmap to this plan'}, '*')" style="margin-left:8px">Ask agent to expand</button></div><div class="mini" style="margin-top:12px">This entire card is the agent's response — a complete, standalone HTML document. No text outside the HTML.</div></div></div></body></html>`, timestamp: '19:13' });

                messages.push({ type: 'user', content: 'Show a progress dashboard with sound', timestamp: '19:14' });
                messages.push({ type: 'agent', content: `<!doctype html><html><head><meta charset="UTF-8"><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');body{font-family:'Inter',system-ui,sans-serif;margin:0;padding:0;background:#f8fafc;color:#0f172a;font-size:13.5px;line-height:1.6}.card{max-width:860px;margin:0 auto;background:white;border:1px solid #e2e8f0;border-radius:12px;box-shadow:0 4px 6px -1px rgb(15 23 42 / 0.07);overflow:hidden}.header{padding:14px 18px;background:linear-gradient(to right,#f8fafc,#ffffff);border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px}.header .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:#d1fae5;color:#059669}.content{padding:18px 20px}.section{margin-bottom:14px}.section h4{margin:0 0 6px;font-size:0.95rem;color:#059669}button,.btn{font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid #e2e8f0;background:white;cursor:pointer}button:hover{background:#f1f5f9}.progress{height:6px;background:#e2e8f0;border-radius:3px;margin:6px 0}.progress > div{height:6px;background:#10b981;border-radius:3px}.mini{font-size:0.8rem;color:#64748b}</style></head><body><div class="card"><div class="header"><span style="font-weight:700">Agent HTML Response</span><span class="badge">RICH UI</span></div><div class="content"><h3 style="margin:0 0 12px">Progress Dashboard — Show a progress dashboard with sound</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px"><div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px"><div class="mini">OVERALL</div><div style="font-size:1.8rem;font-weight:700">73%</div><div class="progress"><div style="width:73%"></div></div></div><div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px"><div class="mini">CARDS GENERATED</div><div style="font-size:1.8rem;font-weight:700">14</div><div class="mini">this session</div></div><div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px"><div class="mini">AVG RESPONSE</div><div style="font-size:1.8rem;font-weight:700">1.2s</div></div></div><div><button onclick="alert('This would open the full artifact explorer in a real harness'); parent.postMessage({type:'harness-request', action:'requestFollowUp', payload:'Show detailed artifact list and export options'}, '*')">Open full explorer</button><button onclick="parent.postMessage({type:'harness-request', action:'requestFollowUp', payload:'Add sound notifications and a live activity feed to this dashboard'}, '*')" style="margin-left:8px">Enhance with sound + feed</button></div><div class="mini" style="margin-top:12px">Fully self-contained HTML card. Click buttons to interact or request follow-ups from the agent.</div></div></div></body></html>`, timestamp: '19:14' });

                renderThread();
            }
        }, 300);

        // Initial load
        loadSession();

        console.log('%c[Harness Production] Rich agent HTML cards + full conversation flow active. This no longer feels like a mockup — the cards use the project\'s own design language and contract.', 'color:#059669');
    </script>
</body>
</html>
